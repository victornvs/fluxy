<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5b4fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="200" fill="url(#grad2)" opacity="0.3"/>
  
  <!-- F letter stylized as flow chart -->
  <path d="M160 140 L160 372 L200 372 L200 280 L320 280 L320 240 L200 240 L200 180 L340 180 L340 140 Z" fill="white" opacity="0.95"/>
  
  <!-- Flow arrow -->
  <path d="M340 320 L420 320 L420 360 L480 340 L420 320 L420 360" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  
  <!-- Data dots -->
  <circle cx="380" cy="200" r="16" fill="white" opacity="0.6"/>
  <circle cx="420" cy="240" r="12" fill="white" opacity="0.4"/>
  <circle cx="400" cy="160" r="10" fill="white" opacity="0.5"/>
</svg>
